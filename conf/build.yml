# layout_kind: plan.md item 10
# (docs/build_conanfile_commonization_plan.md §2) - data read by the common
# scripts/build.py and conanfile.py templates so this component's real build
# shape never becomes a code branch in either shared file. package_kind
# removed entirely (item 10's own follow-up finding, plan.md, 2026-07-20) -
# library vs. application was never read differently anywhere except
# conanfile.py's layout(), which now branches on Conan's own
# self.package_type instead of a redundant second field.
#
# Target keys (sil:/gtest: below, §2.1a, revised 2026-07-20): no separate
# targets: field - every real target is its own explicit key under
# variants.<project>, discovered directly by build.py. gtest: reuses sil's
# platforms: list via a YAML anchor/alias since both build for the same
# toolchain today.

layout_kind: output_folder

# recipe: the Conan-package identity the byte-identical conanfile.py template
# reads (plan.md item 20, docs/conanfile_commonality_plan.md §7.2). Only the
# data that cannot be derived from the package name lives here: package_type,
# and the lib name(s). name/version come from CMakeLists.txt's project(); the
# cmake target/file names are derived by convention (adas-vdy -> AdasVdy).
# Named recipe: (not package:) to avoid clashing with the future `package`
# build target under variants.<project>.
recipe:
  type: shared-library
  libs: [vdy_sil]

variants:
  base:
    requires:
      - protobuf/3.21.12
      - yaml-cpp/0.8.0
      - adas-interfaces/1.0.0
      - adas-shared-config/1.0.0
    tool_requires:
      - protobuf/3.21.12
    sil:
      platforms: &base_platforms
        - build: vs2026
    gtest:
      platforms: *base_platforms
    # Rest of the frozen target vocabulary (plan.md item 14,
    # docs/build_grammar.md) - uncomment as each gains a real implementation:
    # coverage: { platforms: *base_platforms }        # gtest + OpenCppCoverage/gcov
    # docs:     { platforms: [{ build: noarch }] }    # doxygen; noarch = platform-independent
    # package:  { platforms: *base_platforms }        # conan create (+ --upload)
    # prod:     { platforms: [{ build: aarch64_qcc_qnx }, { build: tda4_ti }] }
  cus1:
    requires:
      - protobuf/3.21.12
      - yaml-cpp/0.8.0
      - adas-interfaces/1.0.0
      - adas-shared-config/1.0.0
    tool_requires:
      - protobuf/3.21.12
    sil:
      platforms: &cus1_platforms
        - build: vs2026
    gtest:
      platforms: *cus1_platforms
